<div class="container mt-4" style="max-width: 600px;">
  <h2 class="mb-3">Edit Employee</h2>

  <form (ngSubmit)="onSubmit()">
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>First Name</label>
        <input class="form-control" [(ngModel)]="first_name" name="first_name" required>
      </div>

      <div class="col-md-6 mb-3">
        <label>Last Name</label>
        <input class="form-control" [(ngModel)]="last_name" name="last_name" required>
      </div>
    </div>

    <div class="mb-3">
      <label>Email</label>
      <input type="email" class="form-control" [(ngModel)]="email" name="email">
    </div>

    <div class="mb-3">
      <label>Gender</label>
      <select class="form-control" [(ngModel)]="gender" name="gender">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="mb-3">
      <label>Designation</label>
      <input class="form-control" [(ngModel)]="designation" name="designation" required>
    </div>

    <div class="mb-3">
      <label>Salary</label>
      <input type="number" min="1000" class="form-control" [(ngModel)]="salary" name="salary" required>
    </div>

    <div class="mb-3">
      <label>Date of Joining</label>
      <input type="date" class="form-control" [(ngModel)]="date_of_joining" name="date_of_joining" required>
    </div>

    <div class="mb-3">
      <label>Department</label>
      <input class="form-control" [(ngModel)]="department" name="department" required>
    </div>

    <div class="mb-3">
      <label>Upload Photo</label>
      <input type="file" class="form-control" (change)="onFileSelected($event)">
    </div>

    <button class="btn btn-warning w-100">Save Changes</button>
  </form>

  <button class="btn btn-secondary mt-3" routerLink="/employees">Cancel</button>
</div>
