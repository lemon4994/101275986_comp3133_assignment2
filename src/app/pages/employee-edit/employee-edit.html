<div class="container mt-4" style="max-width: 600px;">
  <h2 class="mb-3">Edit Employee</h2>

  <form (ngSubmit)="onSubmit()">
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>First Name</label>
        <input class="form-control" [(ngModel)]="first_name" name="first_name" required>
      </div>

      <div class="col-md-6 mb-3">
        <label>Last Name</label>
        <input class="form-control" [(ngModel)]="last_name" name="last_name" required>
      </div>
    </div>

    <div class="mb-3">
      <label>Email</label>
      <input type="email" class="form-control" [(ngModel)]="email" name="email" required>
    </div>

    <div class="mb-3">
      <label>Position</label>
      <input class="form-control" [(ngModel)]="position" name="position" required>
    </div>

    <div class="mb-3">
      <label>Department</label>
      <input class="form-control" [(ngModel)]="department" name="department" required>
    </div>

    <div class="mb-3">
      <label>Current Photo</label><br>
      <img *ngIf="photoUrl"
           [src]="photoUrl"
           class="img-fluid rounded mb-2"
           style="max-height: 200px;">
    </div>

    <div class="mb-3">
      <label>Replace Photo</label>
      <input type="file" class="form-control" (change)="onFileSelected($event)">
    </div>

    <button class="btn btn-warning w-100">Save Changes</button>
  </form>

  <button class="btn btn-secondary mt-3" routerLink="/employees">Cancel</button>
</div>
